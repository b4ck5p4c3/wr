---
- name: Deploy the wr webring backend
  hosts: webring
  become: true

  vars:
    wr_user: wr
    wr_binary: "{{ playbook_dir }}/../../wr"
    wr_config_dir: /etc/wr
    wr_log_dir: /var/log/wr

  tasks:
    - name: Check the release binary exists
      delegate_to: localhost
      become: false
      run_once: true
      ansible.builtin.stat:
        path: "{{ wr_binary }}"
      register: wr_binary_stat

    - name: Require the release binary
      delegate_to: localhost
      become: false
      run_once: true
      ansible.builtin.assert:
        that: wr_binary_stat.stat.exists
        fail_msg: "The release binary {{ wr_binary }} is missing. Build it with `make MODE=rel`, or run `make deploy` to build and ship in one step."
        success_msg: "The release binary is present."

    - name: Create the wr system user
      ansible.builtin.user:
        name: "{{ wr_user }}"
        system: true
        create_home: true
        shell: /usr/sbin/nologin

    - name: Create the config and log directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ wr_user }}"
        group: "{{ wr_user }}"
        mode: "0750"
      loop:
        - "{{ wr_config_dir }}"
        - "{{ wr_log_dir }}"

    - name: Install the release binary
      ansible.builtin.copy:
        src: "{{ wr_binary }}"
        dest: /usr/local/bin/wr
        mode: "0755"
      notify: Restart wr

    - name: Render the environment file
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../files/wr.env.j2"
        dest: "{{ wr_config_dir }}/wr.env"
        owner: "{{ wr_user }}"
        group: "{{ wr_user }}"
        mode: "0640"
      notify: Restart wr

    - name: Install the systemd unit
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../files/wr.service"
        dest: /etc/systemd/system/wr.service
        mode: "0644"
      notify:
        - Reload systemd
        - Restart wr

    - name: Enable and start wr
      ansible.builtin.systemd:
        name: wr
        enabled: true
        state: started

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart wr
      ansible.builtin.systemd:
        name: wr
        state: restarted
