openapi: 3.1.0
info:
  title: wr webring API
  version: "1.0.0"
  description: >-
    The JSON API of the wr webring backend. The public navigation routes serve
    the ring, the auth routes open a session, and the panel and admin routes
    manage the member sites behind the session cookie.
servers:
  - url: /
    description: The server origin, every call is same-origin.
tags:
  - name: navigation
    description: The read-only ring, open to anyone.
  - name: auth
    description: The sign-in flow and the session cookie.
  - name: panel
    description: The user panel behind the session cookie.
  - name: admin
    description: The admin panel behind the session cookie and the admin role.
  - name: comments
    description: The footer comments by the ring members.
paths:
  /sites:
    get:
      tags: [navigation]
      summary: List the active sites.
      description: The active member sites are returned as an array.
      security: []
      responses:
        "200":
          description: The active sites.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WebringWebsite"
  /{slug}:
    get:
      tags: [navigation]
      summary: Redirect to a site.
      security: []
      parameters:
        - $ref: "#/components/parameters/Slug"
      responses:
        "302":
          description: A redirect to the site url.
        "404":
          $ref: "#/components/responses/NotFound"
  /{slug}/data:
    get:
      tags: [navigation]
      summary: Return the navigation around a site.
      security: []
      parameters:
        - $ref: "#/components/parameters/Slug"
      responses:
        "200":
          description: The previous, the current, and the next site.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebringWebsiteNavigationData"
        "404":
          $ref: "#/components/responses/NotFound"
  /{slug}/{step}:
    get:
      tags: [navigation]
      summary: Step the ring and redirect.
      security: []
      parameters:
        - $ref: "#/components/parameters/Slug"
        - $ref: "#/components/parameters/Step"
      responses:
        "302":
          description: A redirect to the stepped site url.
        "404":
          $ref: "#/components/responses/NotFound"
  /{slug}/{step}/data:
    get:
      tags: [navigation]
      summary: Step the ring and return the navigation.
      security: []
      parameters:
        - $ref: "#/components/parameters/Slug"
        - $ref: "#/components/parameters/Step"
      responses:
        "200":
          description: The navigation around the stepped site.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebringWebsiteNavigationData"
        "404":
          $ref: "#/components/responses/NotFound"
  /auth/github:
    get:
      tags: [auth]
      summary: Start the GitHub sign-in.
      description: >-
        A redirect to GitHub is returned, and the wr_oauth_state cookie is set
        to guard the callback.
      security: []
      responses:
        "302":
          description: A redirect to the GitHub authorize page.
          headers:
            Set-Cookie:
              description: The wr_oauth_state cookie.
              schema:
                type: string
  /auth/github/callback:
    get:
      tags: [auth]
      summary: Finish the GitHub sign-in.
      security: []
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: The authorization code from GitHub.
        - name: state
          in: query
          required: true
          schema:
            type: string
          description: The state echoed back from GitHub.
      responses:
        "302":
          description: >-
            A redirect to the panel or the admin panel, with the wr_session
            cookie set.
          headers:
            Set-Cookie:
              description: The wr_session cookie.
              schema:
                type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/telegram/callback:
    get:
      tags: [auth]
      summary: Finish the Telegram sign-in.
      security: []
      parameters:
        - name: hash
          in: query
          required: true
          schema:
            type: string
          description: The HMAC the widget signs the fields with.
        - name: id
          in: query
          required: true
          schema:
            type: string
          description: The Telegram user id.
        - name: auth_date
          in: query
          required: false
          schema:
            type: string
          description: The unix time the widget signed the login at.
        - name: first_name
          in: query
          required: false
          schema:
            type: string
          description: The display name from Telegram.
      responses:
        "302":
          description: A redirect with the wr_session cookie set.
          headers:
            Set-Cookie:
              description: The wr_session cookie.
              schema:
                type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/logout:
    post:
      tags: [auth]
      summary: End the session.
      description: The session row is deleted and the cookie is cleared.
      security:
        - sessionCookie: []
      responses:
        "200":
          $ref: "#/components/responses/Message"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
  /auth/dev:
    get:
      tags: [auth]
      summary: Bypass the login in dev mode.
      description: >-
        A session is opened for a fixed dev account with the chosen role. The
        endpoint answers 404 when dev mode is off.
      security: []
      parameters:
        - name: role
          in: query
          required: false
          schema:
            type: string
            enum: [admin, user]
          description: The role to log in as, a user by default.
      responses:
        "302":
          description: A redirect with the wr_session cookie set.
          headers:
            Set-Cookie:
              description: The wr_session cookie.
              schema:
                type: string
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/config:
    get:
      tags: [panel]
      summary: Return the public client config.
      description: >-
        The flags the frontend needs to render the login, the dev mode state and
        which providers are available.
      security: []
      responses:
        "200":
          description: The client config.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientConfig"
  /api/v1/me:
    get:
      tags: [panel]
      summary: Return the current account.
      description: >-
        The account behind the session cookie is returned with its sites. An
        admin sees every site, a user sees only the sites it owns.
      security:
        - sessionCookie: []
      responses:
        "200":
          description: The current account.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PanelAccount"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/sites/add:
    post:
      tags: [panel]
      summary: Submit a site for review.
      description: >-
        The request is written as a pending add and waits for an admin to
        approve it.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteInput"
      responses:
        "200":
          $ref: "#/components/responses/Message"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
  /api/v1/sites/rename:
    post:
      tags: [panel]
      summary: Submit a rename for review.
      description: >-
        The request is written as a pending rename of a site the caller owns.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenameInput"
      responses:
        "200":
          $ref: "#/components/responses/Message"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
  /api/v1/sites/react:
    post:
      tags: [panel]
      summary: Toggle an emoji reaction on a site.
      description: >-
        The reaction is toggled for the signed-in caller. A second react with
        the same emoji removes it. The emoji is one of poop, like, eyes, fire,
        star, or skull.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReactInput"
      responses:
        "200":
          $ref: "#/components/responses/Message"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
  /api/v1/comments:
    get:
      tags: [comments]
      summary: List the approved footer comments.
      description: >-
        Only approved comments are returned, newest first. The page is selected
        by the offset and the limit.
      security: []
      parameters:
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: The approved comments, newest first.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
  /api/v1/comments/add:
    post:
      tags: [comments]
      summary: Post a footer comment.
      description: >-
        The caller must own a site in the ring. The body may mention a site by
        its slug with an at sign. A posted comment is held for admin approval,
        and a body with profanity is rejected.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentInput"
      responses:
        "200":
          $ref: "#/components/responses/Message"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
  /api/v1/admin/pending:
    get:
      tags: [admin]
      summary: List the pending actions.
      security:
        - sessionCookie: []
      responses:
        "200":
          description: The pending actions.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PendingAction"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/admin/pending/approve:
    post:
      tags: [admin]
      summary: Approve a pending action.
      description: >-
        An approved add writes the site into the store, and an approved rename
        applies the new name.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdInput"
      responses:
        "200":
          $ref: "#/components/responses/Message"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
  /api/v1/admin/pending/reject:
    post:
      tags: [admin]
      summary: Reject a pending action.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdInput"
      responses:
        "200":
          $ref: "#/components/responses/Message"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
  /api/v1/admin/site:
    post:
      tags: [admin]
      summary: Edit a site.
      description: An admin writes the site directly, without the pending workflow.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteInput"
      responses:
        "200":
          $ref: "#/components/responses/Message"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
  /api/v1/admin/site/add:
    post:
      tags: [admin]
      summary: Add a site.
      description: An admin add bypasses the pending workflow and owns the site.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteInput"
      responses:
        "200":
          $ref: "#/components/responses/Message"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
  /api/v1/admin/site/delete:
    post:
      tags: [admin]
      summary: Remove a site.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SlugInput"
      responses:
        "200":
          $ref: "#/components/responses/Message"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
  /api/v1/admin/logs:
    get:
      tags: [admin]
      summary: Read the server log tail.
      security:
        - sessionCookie: []
      responses:
        "200":
          description: The retained server log lines, oldest first.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/admin/audit:
    get:
      tags: [admin]
      summary: Read the admin audit trail.
      security:
        - sessionCookie: []
      responses:
        "200":
          description: The recorded admin actions, newest first.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditEntry"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/admin/comments:
    get:
      tags: [admin]
      summary: List the comments awaiting approval.
      security:
        - sessionCookie: []
      responses:
        "200":
          description: The pending comments, newest first.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/admin/comments/approve:
    post:
      tags: [admin]
      summary: Approve a pending comment.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdInput"
      responses:
        "200":
          $ref: "#/components/responses/Message"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
  /api/v1/admin/comments/delete:
    post:
      tags: [admin]
      summary: Delete a comment.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdInput"
      responses:
        "200":
          $ref: "#/components/responses/Message"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: wr_session
      description: The session cookie set on a sign-in.
  parameters:
    Slug:
      name: slug
      in: path
      required: true
      description: The site slug, lowercase a-z, 0-9, and a dash.
      schema:
        type: string
    Step:
      name: step
      in: path
      required: true
      description: The navigation step.
      schema:
        type: string
        enum: [next, prev, random]
  responses:
    Message:
      description: A plain message.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Message"
    NotFound:
      description: The slug is unknown or the ring is empty.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Message"
    BadRequest:
      description: A required field is missing or invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Message"
    Unauthorized:
      description: The caller is not signed in.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Message"
    Forbidden:
      description: The caller may not perform the action.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Message"
    MethodNotAllowed:
      description: The endpoint requires POST.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Message"
  schemas:
    ClientConfig:
      type: object
      description: The flags the frontend reads to render the login.
      properties:
        is_dev:
          type: boolean
          description: True when the server runs in dev mode.
        github:
          type: boolean
          description: True when the GitHub provider is configured.
        telegram_bot:
          type: string
          description: The Telegram bot id, an empty string when not configured.
      required: [is_dev, github, telegram_bot]
    WebringWebsite:
      type: object
      description: A public site in the ring.
      properties:
        slug:
          type: string
        name:
          type: string
        url:
          type: string
        description:
          type: string
          description: A short blurb, an empty string when none is given.
        created_at:
          type: integer
          format: int64
          description: The unix time the site joined the ring.
        reactions:
          type: object
          description: >-
            The emoji reaction counts on the public listing, keyed by the emoji
            name. The key is one of poop, like, eyes, fire, star, or skull.
          additionalProperties:
            type: integer
            format: int64
        reacted:
          type: array
          description: >-
            The emoji the signed-in caller has reacted with, present on the
            public listing only when a session cookie is sent.
          items:
            type: string
      required: [slug, name, url, description, created_at]
    WebringWebsiteNavigationData:
      type: object
      description: The neighbours around a site.
      properties:
        previous:
          $ref: "#/components/schemas/WebringWebsite"
        current:
          $ref: "#/components/schemas/WebringWebsite"
        next:
          $ref: "#/components/schemas/WebringWebsite"
      required: [previous, current, next]
    PanelSite:
      type: object
      description: A site as the panel sees it, with the liveness fields.
      properties:
        slug:
          type: string
        name:
          type: string
        url:
          type: string
        description:
          type: string
        is_reachable:
          type: boolean
        last_seen_at:
          type: integer
          format: int64
          description: The unix time of the last successful probe.
        uptime:
          type: array
          description: >-
            The reachability over the last seven days in 168 hourly buckets,
            oldest first. Each entry is the up percentage from 0 to 100, or -1
            for an hour with no probe.
          items:
            type: integer
            format: int64
        owner:
          type: string
          description: The identity that owns the site.
      required:
        [slug, name, url, description, is_reachable, last_seen_at, uptime, owner]
    PanelAccount:
      type: object
      description: The signed-in account with its sites.
      properties:
        identity:
          type: string
          description: The provider identity, like github or telegram and the id.
        display_name:
          type: string
        is_admin:
          type: boolean
        sites:
          type: array
          items:
            $ref: "#/components/schemas/PanelSite"
        pending:
          type: array
          description: The caller's own submissions awaiting review.
          items:
            $ref: "#/components/schemas/Submission"
      required: [identity, display_name, is_admin, sites, pending]
    Submission:
      type: object
      description: A caller's own add or rename awaiting review.
      properties:
        id:
          type: integer
          format: int64
        kind:
          type: string
          enum: [add, rename]
        target_slug:
          type: string
        payload:
          type: string
          description: >-
            The requested data, a JSON object for an add and the new name for a
            rename.
      required: [id, kind, target_slug, payload]
    PendingAction:
      type: object
      description: An add or a rename that waits for an admin.
      properties:
        id:
          type: integer
          format: int64
        kind:
          type: string
          enum: [add, rename]
        owner:
          type: string
        owner_display_name:
          type: string
          description: The submitter display name for the admin to contact them.
        target_slug:
          type: string
        payload:
          type: string
          description: >-
            The requested data, a JSON object for an add and the new name for a
            rename.
      required: [id, kind, owner, owner_display_name, target_slug, payload]
    SiteInput:
      type: object
      description: The fields for an add or an edit.
      properties:
        slug:
          type: string
        name:
          type: string
        url:
          type: string
          description: An http or https url.
        description:
          type: string
          description: A short blurb, 280 characters or fewer.
      required: [slug, name, url]
    RenameInput:
      type: object
      properties:
        slug:
          type: string
        name:
          type: string
      required: [slug, name]
    ReactInput:
      type: object
      properties:
        slug:
          type: string
        emoji:
          type: string
          description: One of poop, like, eyes, fire, star, or skull.
      required: [slug, emoji]
    IdInput:
      type: object
      properties:
        id:
          type: integer
          format: int64
      required: [id]
    SlugInput:
      type: object
      properties:
        slug:
          type: string
      required: [slug]
    Comment:
      type: object
      description: A footer comment by a ring member.
      properties:
        id:
          type: integer
          format: int64
        author_name:
          type: string
        body:
          type: string
          description: The text, which may mention a site by its slug.
        created_at:
          type: integer
          format: int64
      required: [id, author_name, body, created_at]
    CommentInput:
      type: object
      properties:
        body:
          type: string
          description: The comment text, 500 characters or fewer.
      required: [body]
    Message:
      type: object
      properties:
        message:
          type: string
      required: [message]
    AuditEntry:
      type: object
      description: One recorded admin action.
      properties:
        id:
          type: integer
          format: int64
        actor:
          type: string
          description: The acting label, the display name or the identity.
        actor_ip:
          type: string
          description: The acting client address, from a forwarded header or the peer.
        action:
          type: string
          description: The operation, like add site or react add.
        target:
          type: string
          description: The affected slug or the pending target.
        detail:
          type: string
          description: A short human note about the action.
        created_at:
          type: integer
          format: int64
          description: The unix time the action was recorded.
      required: [id, actor, actor_ip, action, target, detail, created_at]
